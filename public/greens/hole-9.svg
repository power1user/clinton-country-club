  <ellipse cx="80"  cy="170" rx="20" ry="14" fill="#D4C878" opacity="0.85"/>
  <!-- Green: kidney, curling toward the pond -->
  <path d="M 70 180 Q 80 130 160 130 Q 220 130 235 165 Q 230 200 175 215 Q 110 222 70 180 Z" fill="#3D5E32"/>
  <path d="M 85 178 Q 95 142 160 142 Q 215 142 225 168 Q 220 195 172 207 Q 115 213 85 178 Z" fill="#6FBF54"/>
