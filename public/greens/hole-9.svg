  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- The pond, back-right of the green -->
  <path d="M 230 60 Q 290 50 330 75 Q 360 110 340 145 Q 305 165 260 150 Q 215 130 230 60 Z" fill="#2A5878" opacity="0.92"/>
  <path d="M 245 75 Q 290 68 320 88 Q 345 115 328 140 Q 300 155 265 142 Q 230 125 245 75 Z" fill="#3A6E8C" opacity="0.6"/>
  <!-- Front bunker -->
