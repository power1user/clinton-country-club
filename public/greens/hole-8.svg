<!-- Hole 8, Par 4 (373 yds). Round-ish green with prominent water hazard at the back. -->
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- Water hazard at the back/left of the green -->
  <ellipse cx="160" cy="80"  rx="80" ry="34" fill="#2A5878" opacity="0.92"/>
  <ellipse cx="160" cy="80"  rx="72" ry="28" fill="#3A6E8C" opacity="0.6"/>
  <!-- Side bunker -->
  <ellipse cx="320" cy="120" rx="22" ry="16" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="100" cy="220" rx="26" ry="14" fill="#D4C878" opacity="0.9"/>
  <!-- Green -->
  <ellipse cx="240" cy="180" rx="98" ry="65" fill="#3D5E32"/>
  <ellipse cx="240" cy="180" rx="82" ry="50" fill="#6FBF54"/>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="Lora, serif" letter-spacing="2">FRONT</text>
</svg>
