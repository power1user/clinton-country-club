  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- Top bunkers -->
  <ellipse cx="100" cy="100" rx="30" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="180" cy="92"  rx="34" ry="13" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="280" cy="100" rx="38" ry="14" fill="#D4C878" opacity="0.9"/>
  <!-- Front bunker -->
  <ellipse cx="320" cy="220" rx="22" ry="12" fill="#D4C878" opacity="0.85"/>
  <!-- Green: long elongated -->
  <path d="M 60 165 Q 100 125 200 130 Q 320 135 350 175 Q 345 220 200 215 Q 70 210 60 165 Z" fill="#3D5E32"/>
  <path d="M 75 165 Q 110 138 200 142 Q 315 146 338 175 Q 332 205 200 202 Q 85 200 75 165 Z" fill="#6FBF54"/>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="Lora, serif" letter-spacing="2">FRONT</text>
