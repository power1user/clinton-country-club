<!-- Hole 2, Par 4. Long horizontal green with bunkers along the back edge. -->
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- Back bunkers (along the top) -->
  <ellipse cx="120" cy="80"  rx="36" ry="12" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="210" cy="70"  rx="42" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="300" cy="80"  rx="34" ry="12" fill="#D4C878" opacity="0.85"/>
  <!-- Side bunker -->
  <ellipse cx="60"  cy="170" rx="22" ry="14" fill="#D4C878" opacity="0.85"/>
  <!-- Green -->
  <ellipse cx="200" cy="180" rx="170" ry="65" fill="#3D5E32"/>
  <ellipse cx="200" cy="180" rx="150" ry="49" fill="#6FBF54"/>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="Lora, serif" letter-spacing="2">FRONT</text>
</svg>
