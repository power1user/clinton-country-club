<!-- Hole 5, Par 4 (244 yds, short). Vertical-ish small green with side bunkers. -->
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- Side bunkers -->
  <ellipse cx="135" cy="160" rx="14" ry="32" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="265" cy="160" rx="14" ry="32" fill="#D4C878" opacity="0.9"/>
  <!-- Front bunker -->
  <ellipse cx="200" cy="230" rx="40" ry="12" fill="#D4C878" opacity="0.85"/>
  <!-- Green: tall oval -->
  <ellipse cx="200" cy="160" rx="60" ry="80" fill="#3D5E32"/>
  <ellipse cx="200" cy="160" rx="48" ry="68" fill="#6FBF54"/>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="Lora, serif" letter-spacing="2">FRONT</text>
</svg>
