<!--
  Clinton CC course overview — stylized illustration derived from the master
  layout map at the course entrance. Approximate positions of holes 1–9 around
  the clubhouse, with the pond at hole 9 (top-right) and the pool just below
  the pond.
-->
<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Background grass / rough -->
  <rect width="600" height="420" fill="#2A4020"/>

  <!-- Subtle texture: scattered tree shadows -->
  <g opacity="0.35">
    <circle cx="40"  cy="60"  r="14" fill="#1E3017"/>
    <circle cx="80"  cy="40"  r="10" fill="#1E3017"/>
    <circle cx="560" cy="350" r="12" fill="#1E3017"/>
    <circle cx="50"  cy="380" r="10" fill="#1E3017"/>
    <circle cx="580" cy="60"  r="10" fill="#1E3017"/>
    <circle cx="20"  cy="220" r="10" fill="#1E3017"/>
  </g>

  <!-- ── Fairways ─────────────────────────────────────────────────────────
       Each shape is a rough fairway corridor based on the master map.
       Order: 1 → 2 → 3 → 4 → 5 → 6 → 7 → 8 → 9. -->

  <!-- Hole 1: long fairway down the right side, dogleg left at end -->
  <path d="M 410 360 Q 420 280 380 220 Q 320 175 270 165" stroke="#5A8A4A" stroke-width="32" stroke-linecap="round" fill="none"/>
  <!-- Hole 2: parallel to 1, returning right -->
  <path d="M 280 175 Q 310 230 340 290 Q 360 340 370 370" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 3: shorter, going left -->
  <path d="M 260 290 Q 200 280 140 270" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 4: par 3, short, going up -->
  <path d="M 130 250 Q 120 215 130 185" stroke="#5A8A4A" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Hole 5: par 4 short, going right -->
  <path d="M 140 170 Q 200 165 250 175" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 6: middle section -->
  <path d="M 250 165 Q 270 130 240 95" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 7: par 4 longer, going left along the top -->
  <path d="M 230 90 Q 165 85 110 100" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 8: par 4, runs across the top toward the right -->
  <path d="M 110 95 Q 200 70 330 75 Q 400 80 440 110" stroke="#5A8A4A" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Hole 9: par 3, short up to green near pond -->
  <path d="M 450 130 Q 480 125 510 115" stroke="#5A8A4A" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- ── Bunkers (decorative, scattered) ──────────────────────────────────-->
  <g opacity="0.85" fill="#D4C878">
    <ellipse cx="395" cy="225" rx="9" ry="5"/>
    <ellipse cx="285" cy="170" rx="8" ry="5"/>
    <ellipse cx="148" cy="265" rx="8" ry="4"/>
    <ellipse cx="118" cy="200" rx="7" ry="4"/>
    <ellipse cx="245" cy="170" rx="7" ry="4"/>
    <ellipse cx="240" cy="120" rx="7" ry="4"/>
    <ellipse cx="165" cy="105" rx="9" ry="4"/>
    <ellipse cx="320" cy="100" rx="8" ry="5"/>
    <ellipse cx="430" cy="115" rx="9" ry="5"/>
  </g>

  <!-- ── Pond at hole 9 (top right) ──────────────────────────────────────-->
  <ellipse cx="535" cy="80" rx="55" ry="35" fill="#2A5878" opacity="0.95"/>
  <ellipse cx="535" cy="80" rx="48" ry="28" fill="#3A6E8C" opacity="0.6"/>

  <!-- ── Greens (slightly lighter circles labeled with hole number) ──────-->
  <g>
    <!-- 1 -->
    <circle cx="270" cy="160" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="270" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">1</text>
    <!-- 2 -->
    <circle cx="370" cy="372" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="370" y="376" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">2</text>
    <!-- 3 -->
    <circle cx="135" cy="270" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="135" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">3</text>
    <!-- 4 -->
    <circle cx="130" cy="180" r="11" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="130" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">4</text>
    <!-- 5 -->
    <circle cx="252" cy="172" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="252" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">5</text>
    <!-- 6 -->
    <circle cx="237" cy="92" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="237" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">6</text>
    <!-- 7 -->
    <circle cx="108" cy="100" r="12" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="108" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">7</text>
    <!-- 8 -->
    <circle cx="442" cy="112" r="13" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="442" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">8</text>
    <!-- 9 -->
    <circle cx="490" cy="113" r="11" fill="#6FBF54" stroke="#3D5E32" stroke-width="2"/>
    <text x="490" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A2D" font-family="Playfair Display, serif">9</text>
  </g>

  <!-- ── Pool ─────────────────────────────────────────────────────────────-->
  <rect x="510" y="170" width="50" height="32" rx="3" fill="#3A6E8C" stroke="#1B3A2D" stroke-width="1.5"/>
  <rect x="510" y="170" width="50" height="32" rx="3" fill="#5BA0C8" opacity="0.4"/>
  <text x="535" y="190" text-anchor="middle" font-size="9" fill="#F2EDE0" font-family="Lora, serif" font-weight="700">POOL</text>

  <!-- ── Clubhouse ───────────────────────────────────────────────────────-->
  <rect x="345" y="240" width="60" height="44" rx="4" fill="#9B7A1E" stroke="#1B3A2D" stroke-width="1.5"/>
  <polygon points="345,240 375,222 405,240" fill="#7A5A0A"/>
  <text x="375" y="258" text-anchor="middle" font-size="9" font-weight="700" fill="#F2EDE0" font-family="Playfair Display, serif">CLINTON</text>
  <text x="375" y="272" text-anchor="middle" font-size="8" fill="#F2EDE0" font-family="Lora, serif" letter-spacing="2">CC</text>

  <!-- ── North arrow (subtle) ────────────────────────────────────────────-->
  <g transform="translate(560, 390)" opacity="0.55">
    <polygon points="0,-10 4,4 0,1 -4,4" fill="#F2EDE0"/>
    <text x="0" y="18" text-anchor="middle" font-size="8" fill="#F2EDE0" font-family="Lora, serif">N</text>
  </g>
</svg>
