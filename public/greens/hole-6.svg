  <rect width="400" height="300" fill="#2D4A24"/>
  <!-- Perimeter bunkers -->
  <ellipse cx="80"  cy="135" rx="20" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="80"  cy="200" rx="20" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="320" cy="135" rx="20" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="320" cy="200" rx="20" ry="14" fill="#D4C878" opacity="0.9"/>
  <ellipse cx="200" cy="90"  rx="60" ry="14" fill="#D4C878" opacity="0.85"/>
  <ellipse cx="200" cy="245" rx="60" ry="14" fill="#D4C878" opacity="0.85"/>
  <!-- Green: long horizontal -->
  <ellipse cx="200" cy="170" rx="125" ry="55" fill="#3D5E32"/>
  <ellipse cx="200" cy="170" rx="108" ry="42" fill="#6FBF54"/>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" font-family="Lora, serif" letter-spacing="2">FRONT</text>
</svg>
