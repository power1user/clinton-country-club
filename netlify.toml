# Netlify build configuration for the Clinton Country Club member app.

[build]
  command = "npm run build"
  publish = "dist"

# Vite SPA: every route should serve the same index.html so React Router /
# the in-house screen router can take over client-side.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Cache hashed asset bundles aggressively; never cache index.html.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
